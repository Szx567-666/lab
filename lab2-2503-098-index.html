<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>春韵数字展销平台</title>
    <link rel="stylesheet" href="./css/lab2-2503-098-index.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            春韵书店
        </div>
        <nav class="nav">
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">图书分类</a></li>
                <li><a href="#">热门推荐</a></li>
                <li><a href="#">新书上市</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <aside class="left-sidebar">
            <h3>图书分类</h3>
            <ul>
                <li><a href="#">文学小说</a></li>
                <li><a href="#">科技计算机</a></li>
                <li><a href="#">经管励志</a></li>
                <li><a href="#">少儿读物</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <section class="book-show">
                <h3>图书展示区</h3>
                <div class="book-list">
                    <div class="book-item">
                        <img src="./img/book1.jpg" alt="书籍封面1">
                    </div>
                    <div class="book-item">
                        <img src="./img/book2.jpg" alt="书籍封面2">
                    </div>
                </div>
            </section>

            <section class="hot-recommend">
                <h3>热门推荐</h3>
                <div class="hot-list">
                    <div class="hot-item">《三体》</div>
                    <div class="hot-item">《活着》</div>
                    <div class="hot-item">《平凡的世界》</div>
                </div>
            </section>

            <section class="new-books">
                <h3>新书上市</h3>
                <table border="1">
                    <tr>
                        <th>书名</th>
                        <th>作者</th>
                        <th>价格</th>
                    </tr>
                    <tr>
                        <td>《鲁滨逊漂流记》</td>
                        <td>迪福</td>
                        <td>￥39.9</td>
                    </tr>
                    <tr>
                        <td>巴黎圣母院</td>
                        <td>雨果</td>
                        <td>￥45.9</td>
                    </tr>
                </table>
            </section>
        </main>

        <aside class="right-sidebar">
            <div class="promo-box">
                <h3>限时促销</h3>
                <p>满100减20</p>
                <p>全场图书8折起</p>
            </div>
        </aside>
    </div>
</body>
</html>
